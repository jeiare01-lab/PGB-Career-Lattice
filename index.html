<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PGB Career Lattice | Construction & Manufacturing Pilot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; background: #FEF9F3; }
    .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
    .header { padding: 15px 20px; background: #0D1B3D; color: white; border-radius: 8px; margin-bottom: 30px; text-align: center; }
    .header h2 { margin: 0 0 5px 0; }
    .header p { margin: 0; font-size: 13px; opacity: 0.9; }
    .pilot-badge { display: inline-block; background: #E65100; color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 15px; }
    .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-content { text-align: center; }
    .login-content h1 { font-size: 40px; color: #0D1B3D; margin: 0 0 10px 0; }
    .login-content p { color: #666; margin: 0 0 40px 0; }
    .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 400px; }
    .btn { padding: 40px; background: white; border: 3px solid #E65100; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
    .btn:hover { opacity: 0.9; }
    .profile-form { display: grid; gap: 15px; }
    .profile-form input, .profile-form select { padding: 12px; border: 2px solid #E65100; border-radius: 4px; font-size: 14px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #0D1B3D; }
    .btn-primary { padding: 12px; background: #E65100; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; }
    .btn-secondary { padding: 12px; background: #ccc; color: #0D1B3D; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
    .btn-ai { padding: 12px 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 14px; }
    .btn-ai:disabled { opacity: 0.5; cursor: not-allowed; }
    
    /* Component Navigation */
    .component-nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
    .component-tab { padding: 20px; border-radius: 8px; cursor: pointer; text-align: center; border: 3px solid #ddd; background: white; transition: all 0.3s; }
    .component-tab.active { border-color: #E65100; background: #FEF9F3; }
    .component-tab h3 { color: #0D1B3D; margin: 10px 0 5px 0; }
    .component-tab p { font-size: 12px; color: #666; margin: 0; }
    .component-icon { font-size: 32px; margin-bottom: 10px; }
    .component-step { font-size: 11px; color: #E65100; font-weight: bold; }
    
    /* Assessment Grid */
    .competency-grid { display: grid; gap: 20px; margin-bottom: 20px; }
    .competency-item { padding: 15px; background: white; border-radius: 6px; border-left: 4px solid #0D1B3D; }
    .competency-item h4 { color: #0D1B3D; margin: 0 0 10px 0; }
    .rating-scale { display: flex; gap: 8px; align-items: center; }
    .rating-btn { padding: 8px 12px; border: 2px solid #ddd; background: white; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s; }
    .rating-btn:hover { border-color: #E65100; background: #FEF9F3; }
    .rating-btn.selected { background: #E65100; color: white; border-color: #E65100; }
    
    /* Gap Analysis */
    .gap-analysis { padding: 20px; background: #f0f8ff; border-radius: 8px; margin-top: 20px; border-left: 5px solid #2196F3; }
    .gap-item { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 15px; padding: 12px; background: white; border-radius: 4px; }
    .gap-label { font-weight: 600; color: #0D1B3D; }
    .gap-your-score { text-align: center; }
    .gap-required { text-align: center; }
    .gap-bar { height: 8px; background: #ddd; border-radius: 4px; margin-top: 4px; overflow: hidden; }
    .gap-bar-fill { height: 100%; background: #4CAF50; }
    .gap-bar-fill.yellow { background: #FFC107; }
    .gap-bar-fill.red { background: #F44336; }
    .score { font-size: 18px; font-weight: bold; }
    .score.high { color: #4CAF50; }
    .score.medium { color: #FFC107; }
    .score.low { color: #F44336; }
    
    /* Path Selection */
    .path-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .path-card { padding: 20px; border-radius: 8px; cursor: pointer; border: 3px solid #ddd; background: white; transition: all 0.3s; }
    .path-card.selected { border-color: #E65100; background: #FEF9F3; }
    .path-card h3 { color: #0D1B3D; margin: 0 0 5px 0; }
    .path-card p { color: #666; margin: 0; font-size: 13px; }
    
    /* Affiliate/BU Selection */
    .selection-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px; }
    .selection-card { padding: 12px; border-radius: 6px; cursor: pointer; border: 2px solid #ddd; background: white; text-align: center; transition: all 0.3s; font-size: 13px; }
    .selection-card:hover { border-color: #E65100; background: #FEF9F3; }
    .selection-card.selected { border-color: #E65100; background: #FEF9F3; color: #E65100; font-weight: bold; }
    
    /* Roadmap */
    .roadmap-container { background: white; border-radius: 8px; padding: 30px; margin-bottom: 20px; border: 2px solid #E65100; }
    .roadmap-title { color: #0D1B3D; font-size: 20px; font-weight: bold; margin-bottom: 20px; text-align: center; }
    
    /* Training Section */
    .training-section { margin-top: 25px; padding: 20px; background: #f0f8ff; border-radius: 6px; border-left: 5px solid #2196F3; }
    .training-section h3 { color: #0D1B3D; margin: 0 0 12px 0; font-size: 16px; }
    .training-item { margin-bottom: 12px; padding: 12px; background: white; border-radius: 4px; border-left: 3px solid #2196F3; }
    .training-item-title { font-weight: 600; color: #0D1B3D; }
    .training-item-desc { font-size: 12px; color: #666; margin-top: 4px; }
    
    /* Goals Section */
    .goal-section { margin-top: 25px; padding: 20px; background: #f9f9f9; border-radius: 6px; border-left: 5px solid #0D1B3D; }
    .goal-section h3 { color: #0D1B3D; margin: 0 0 12px 0; font-size: 16px; }
    .goal-item { margin-bottom: 12px; padding: 10px; background: white; border-radius: 4px; border-left: 3px solid #E65100; }
    .goal-item-title { font-weight: 600; color: #0D1B3D; }
    .goal-item-desc { font-size: 13px; color: #666; margin-top: 4px; }
    
    .aspirations-form { margin-top: 20px; padding: 20px; background: #fff3cd; border-radius: 6px; }
    .aspirations-form textarea { width: 100%; min-height: 100px; padding: 12px; border: 2px solid #0D1B3D; border-radius: 4px; font-family: inherit; font-size: 14px; }
    .aspirations-form label { display: block; margin-bottom: 8px; font-weight: 600; color: #0D1B3D; }
    
    .button-row { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
    .button-row button { flex: 1; min-width: 120px; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
    
    .section-header { padding: 12px 15px; background: #0D1B3D; color: white; border-radius: 6px; margin-bottom: 15px; font-weight: bold; font-size: 14px; }
    .section-header.orange { background: #E65100; }
    
    .profile-summary { padding: 20px; background: #FEF9F3; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #E65100; }
    .profile-summary h3 { color: #0D1B3D; margin: 0 0 15px 0; }
    
    .done-screen { text-align: center; padding: 60px 20px; }
    .done-screen h1 { font-size: 60px; margin: 0 0 20px 0; }
    .done-screen h2 { color: #0D1B3D; margin-bottom: 20px; }
    
    .grade-badge { display: inline-block; background: #0D1B3D; color: white; padding: 4px 8px; border-radius: 3px; font-size: 11px; font-weight: bold; }
    
    /* AI Analysis Section */
    .ai-analysis { padding: 20px; background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%); border-radius: 8px; border-left: 5px solid #667eea; margin-top: 20px; }
    .ai-analysis h3 { color: #667eea; margin: 0 0 15px 0; }
    .ai-results { background: white; padding: 20px; border-radius: 6px; margin-top: 15px; max-height: 600px; overflow-y: auto; }
    .ai-results p { line-height: 1.6; color: #333; margin-bottom: 12px; }
    .ai-results h4 { color: #0D1B3D; margin-top: 15px; margin-bottom: 8px; }
    .ai-results ul { margin-left: 20px; }
    .ai-results li { margin-bottom: 6px; }
    .loading { text-align: center; padding: 20px; }
    .loading::after { content: ''; animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { 0% { content: '⚙️'; transform: rotate(0deg); } 100% { content: '⚙️'; transform: rotate(360deg); } }
    
    /* Print Styles */
    @media print {
      .pilot-badge, .button-row, .header button, button, .ai-analysis { display: none !important; }
      body { background: white; }
      .container { max-width: 100%; }
      .profile-summary, .goal-section, .training-section, .aspirations-form { page-break-inside: avoid; }
      .roadmap-container, .gap-analysis { page-break-inside: avoid; }
      h1, h2, h3 { color: #0D1B3D; }
      p { color: #333; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    class CareerLatticePilot {
      constructor() {
        this.screen = 'login';
        this.component = null;
        this.profile = { name: '', employeeId: '', email: '', role: 'JG1', dept: '', supervisor: '', supervisorEmail: '' };
        this.assessments = {};
        this.pathChoice = null;
        this.affiliateChoice = null;
        this.businessUnitChoice = null;
        this.functionalUnitChoice = null;
        this.shortTermGoals = [];
        this.longTermGoals = [];
        this.aspirations = '';
        this.careerRoadmap = [];
        this.aiAnalysis = null;
        this.aiLoading = false;
        this.render();
      }

      getJobGrades() {
        return {
          'JG1': 'Specialist', 'JG2': 'Specialist', 'JG3': 'Specialist',
          'JG4': 'Generalist', 'JG5': 'Generalist', 'JG6': 'Generalist',
          'JG7': 'Lead', 'JG8': 'Lead', 'JG9': 'Lead',
          'JG10': 'Business Partner', 'JG11': 'Business Partner', 'JG12': 'Business Partner',
          'JG13': 'Strategic Partner', 'JG14': 'Strategic Partner', 'JG15': 'Strategic Partner'
        };
      }

      getCompetencies() {
        return [
          { id: 'jobknowledge', name: 'Job Knowledge & Skills', desc: 'Technical expertise and proficiency in your role' },
          { id: 'decision', name: 'Decision Making & Problem Solving', desc: 'Ability to analyze and resolve issues' },
          { id: 'communication', name: 'Communication', desc: 'Clarity and effectiveness in conveying ideas' },
          { id: 'planning', name: 'Planning & Organizing', desc: 'Ability to structure work and manage priorities' },
          { id: 'leadership', name: 'Leadership', desc: 'Influence and ability to guide teams' },
          { id: 'customer', name: 'Customer Focus', desc: 'Responsiveness to stakeholder needs' },
          { id: 'pagsalig', name: 'Pagsalig (Built on Trust)', desc: 'Integrity, reliability, and transparency' },
          { id: 'pagkugi', name: 'Pagkugi (We Keep Going)', desc: 'Resilience and persistence under pressure' },
          { id: 'hiniusang', name: 'Hiniusang Pagtutok (We Get Things Done Together)', desc: 'Collaboration and teamwork' },
          { id: 'pagpalambo', name: 'Pagpalambo (We Strive to Make Things Better)', desc: 'Initiative and continuous improvement' }
        ];
      }

      // Competency Requirements by Job Level
      getCompetencyRequirements() {
        return {
          'Specialist': { jobknowledge: 4, decision: 2, communication: 3, planning: 3, leadership: 1, customer: 3, pagsalig: 4, pagkugi: 3, hiniusang: 3, pagpalambo: 2 },
          'Generalist': { jobknowledge: 4, decision: 3, communication: 4, planning: 4, leadership: 3, customer: 4, pagsalig: 4, pagkugi: 4, hiniusang: 4, pagpalambo: 3 },
          'Lead': { jobknowledge: 4, decision: 4, communication: 5, planning: 5, leadership: 4, customer: 4, pagsalig: 5, pagkugi: 5, hiniusang: 5, pagpalambo: 4 },
          'Business Partner': { jobknowledge: 4, decision: 5, communication: 5, planning: 5, leadership: 5, customer: 5, pagsalig: 5, pagkugi: 5, hiniusang: 5, pagpalambo: 5 },
          'Strategic Partner': { jobknowledge: 5, decision: 5, communication: 5, planning: 5, leadership: 5, customer: 5, pagsalig: 5, pagkugi: 5, hiniusang: 5, pagpalambo: 5 }
        };
      }

      getTrainingPortfolio() {
        return {
          'Specialist': { name: 'Program On-the-GO', programs: ['Work Attitude & Values Enhancement', 'Communication 360 Feedback', 'Microsoft Excel (Basic & Advanced)', 'Time Management', 'Business Correspondence', '8-Hour Mandatory Employee Orientation (MEOSH)'] },
          'Generalist': { name: 'Functional Training Programs', programs: ['HR Management 101', 'Site Management & Administration 101', 'Labor Relations 101', 'Accounting for Non-Accountants', 'Engineering 101', 'Procurement 101', 'HIRAC (Hazard Identification & Risk Assessment)'] },
          'Lead': { name: 'Leadership Foundations: Transitioning to Leader', programs: ['Basic Supervision', 'Developing Extraordinary Leaders', 'Interaction Management Essentials', 'Communicating for Leadership Success', 'Performance Management 101', '12-Step Problem Solving', 'Decision Analysis Framework', 'Presentation Skills'] },
          'Business Partner': { name: 'PGB Leadership Imperatives: Strengthening Your Leadership', programs: ['Coach & Develop for Results', 'KPI Management', 'Inspirational Leadership', 'Collaborative Leadership', 'Managing-Up & Influence', 'Targeted Selection & Competency-Based Interviewing', 'Safety Program Audit (SPA)'] },
          'Strategic Partner': { name: 'PGB Executive Leadership: Defying Convention', programs: ['Executive Presence & Personal Brand', 'Strategic Leadership & Critical Thinking', 'Fostering Innovation', 'High Quality Decision Making', 'Delegating with Purpose', 'Intra & Entrepreneurship', 'EHSS as Strategic Business Partner'] }
        };
      }

      getAffiliateStructure() {
        return {
          'PSC': { 'Construction Support': ['Manufacturing', 'Equipments', 'Electro-Mechanical'], 'Conventional Construction': [], 'Engineering': [], 'Innovative Construction': [], 'Systems Improvement': [], 'Architecture': [] },
          'CSI': { 'RMC Operations': ['Production & Logistics', 'Repairs & Maintenance', 'Quality Control'], 'Sales & Marketing': [], 'Quarrying Operations': [] },
          'AAC': { 'Plant Operations Management': ['Quality Assurance & Control', 'Production & Logistics'], 'Systems & Engineering Management': ['Systems Integration', 'Engineering & Maintenance'], 'Sales & Marketing': ['Sales & Marketing Operations', 'Technical Support', 'After Sales Support'] }
        };
      }

      getAffiliateNames() {
        return { 'PSC': 'Primary Structures Corporation', 'CSI': 'Concrete Solutions Inc', 'AAC': 'AAC Lightweight Block Corporation' };
      }

      getAllAffiliates() { return Object.keys(this.getAffiliateStructure()); }
      getBusinessUnits(affiliate) { return Object.keys(this.getAffiliateStructure()[affiliate] || {}); }
      getFunctionalUnits(affiliate, businessUnit) { const structure = this.getAffiliateStructure(); return structure[affiliate]?.[businessUnit] || []; }

      getCareerRoadmaps() {
        return {
          vertical: [
            { jg: 'JG1-3', title: 'Specialist', level: 'Entry', type: 'current' },
            { jg: 'JG4-6', title: 'Generalist', level: 'First Pit Stop', type: 'short' },
            { jg: 'JG7-9', title: 'Lead', level: 'Short-term (1-2 yrs)', type: 'short' },
            { jg: 'JG10-12', title: 'Business Partner', level: 'Long-term (3-4 yrs)', type: 'long' },
            { jg: 'JG13-15', title: 'Strategic Partner', level: 'Long-term (5+ yrs)', type: 'long' },
            { jg: 'Executive', title: 'VP / Director Level', level: 'Ultimate Goal', type: 'aspiration' }
          ],
          horizontal: [
            { jg: 'JG1-3', title: 'Specialist', level: 'Entry', type: 'current' },
            { jg: 'JG4-6', title: 'Expert Generalist', level: 'First Pit Stop', type: 'short' },
            { jg: 'JG7-9', title: 'Subject Matter Expert Lead', level: 'Short-term (1-2 yrs)', type: 'short' },
            { jg: 'JG10-12', title: 'Senior Expert / Consultant', level: 'Long-term (3-4 yrs)', type: 'long' },
            { jg: 'JG13-15', title: 'Chief Expert / Strategic Advisor', level: 'Long-term (5+ yrs)', type: 'long' },
            { jg: 'Executive', title: 'VP of Specialized Function', level: 'Ultimate Goal', type: 'aspiration' }
          ],
          diagonal: [
            { jg: 'JG1-3', title: 'Specialist', level: 'Entry', type: 'current' },
            { jg: 'JG4-6', title: 'Specialist & Assistant Lead', level: 'First Pit Stop', type: 'short' },
            { jg: 'JG7-9', title: 'Lead & Subject Matter Expert', level: 'Short-term (1-2 yrs)', type: 'short' },
            { jg: 'JG10-12', title: 'Business Partner & Strategist', level: 'Long-term (3-4 yrs)', type: 'long' },
            { jg: 'JG13-15', title: 'Strategic Partner & Director', level: 'Long-term (5+ yrs)', type: 'long' },
            { jg: 'Executive', title: 'Executive Leader', level: 'Ultimate Goal', type: 'aspiration' }
          ]
        };
      }

      getCurrentTrainingTrack() {
        return this.getJobGrades()[this.profile.role];
      }

      calculateGaps() {
        const nextLevel = this.pathChoice ? this.getCareerRoadmaps()[this.pathChoice].find(r => r.type === 'short') : null;
        if (!nextLevel) return {};
        
        const targetGrade = nextLevel.title;
        const requirements = this.getCompetencyRequirements()[targetGrade] || {};
        const gaps = {};
        
        this.getCompetencies().forEach(comp => {
          gaps[comp.id] = {
            name: comp.name,
            current: this.assessments[comp.id] || 0,
            required: requirements[comp.id] || 3,
            gap: (requirements[comp.id] || 3) - (this.assessments[comp.id] || 0)
          };
        });
        
        return gaps;
      }

      generateRoadmap() {
        this.careerRoadmap = this.getCareerRoadmaps()[this.pathChoice];
        this.shortTermGoals = this.careerRoadmap.filter(r => r.type === 'short');
        this.longTermGoals = this.careerRoadmap.filter(r => r.type === 'long');
      }

      async generateAIDevelopmentPlan() {
        this.aiLoading = true;
        this.render();

        try {
          const gaps = this.calculateGaps();
          const gapSummary = Object.values(gaps)
            .filter(g => g.gap > 0)
            .map(g => `${g.name}: Current ${g.current}/5, Target ${g.required}/5`)
            .join('\n');

          const prompt = `You are a career development expert at PGB (Primary Group of Builders), a diversified construction, manufacturing, and real estate company.

An employee has completed their Career Lattice self-assessment. Here's their profile:

NAME: ${this.profile.name}
EMPLOYEE ID: ${this.profile.employeeId}
CURRENT GRADE: ${this.profile.role} (${this.getCurrentTrainingTrack()})
DEPARTMENT: ${this.profile.dept}
CAREER PATH: ${this.pathChoice.toUpperCase()}
BUSINESS AFFILIATE: ${this.affiliateChoice}
BUSINESS UNIT: ${this.businessUnitChoice}

COMPETENCY GAPS (vs. next career level):
${gapSummary}

Based on this profile and the competency gaps identified, please generate a COMPREHENSIVE PERSONALIZED DEVELOPMENT PLAN that includes:

1. **Executive Summary** - One paragraph overview of strengths and development priorities
2. **Top 3 Development Priorities** - List the most critical competencies to develop with explanation
3. **30-60-90 Day Action Plan** - Specific, measurable actions for first 3 months
4. **Training Recommendations** - Which programs from PGB's catalog to prioritize
5. **Mentoring & Coaching** - Suggested mentors, peer learning, or coaching focuses
6. **Key Milestones** - How to measure progress toward next career level
7. **Timeline to Next Level** - Realistic assessment of readiness for promotion
8. **PGB Values Integration** - How to strengthen Pagsalig, Pagkugi, Hiniusang Pagtutok, and Pagpalambo

Keep recommendations practical, specific, and tied to PGB's business context (Construction, Manufacturing, Real Estate).`;

          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              model: "claude-opus-4-6",
              max_tokens: 2000,
              messages: [{ role: "user", content: prompt }]
            })
          });

          if (!response.ok) {
            throw new Error(`API Error: ${response.status}`);
          }

          const data = await response.json();
          this.aiAnalysis = data.content[0].text;
          this.aiLoading = false;
          this.render();
        } catch (error) {
          console.error('API Error:', error);
          this.aiAnalysis = `⚠️ Unable to generate AI analysis. Please try again.\n\nError: ${error.message}`;
          this.aiLoading = false;
          this.render();
        }
      }

      setState(state) {
        Object.assign(this, state);
        this.render();
      }

      render() {
        const app = document.getElementById('app');
        
        if (this.screen === 'login') {
          app.innerHTML = `
            <div class="login-screen">
              <div class="login-content">
                <div class="pilot-badge">🚀 PILOT PROGRAM</div>
                <h1>🎯 PGB Career Lattice</h1>
                <p>Construction & Manufacturing Pilot</p>
                <p style="font-size: 12px; color: #999; margin-top: 10px;">Build Your Career Roadmap</p>
                <div class="button-grid">
                  <button class="btn" onclick="app.setState({screen: 'profile'})">👤 Employee</button>
                </div>
              </div>
            </div>
          `;
        } else if (this.screen === 'profile') {
          app.innerHTML = `
            <div class="container">
              <div class="pilot-badge">🚀 PILOT PROGRAM</div>
              <div class="header">
                <h2>Your Profile</h2>
                <p>Complete your information to get started</p>
              </div>
              <div class="profile-form">
                <input type="text" id="name" placeholder="Full Name *" value="${this.profile.name}">
                <input type="text" id="employeeId" placeholder="Employee ID *" value="${this.profile.employeeId}">
                <input type="email" id="email" placeholder="Email *" value="${this.profile.email}">
                <div class="form-group">
                  <label>Current Job Grade *</label>
                  <select id="role">
                    <option value="JG1">Specialist (JG1-3)</option>
                    <option value="JG2">Specialist (JG1-3)</option>
                    <option value="JG3">Specialist (JG1-3)</option>
                    <option value="JG4">Generalist (JG4-6)</option>
                    <option value="JG5">Generalist (JG4-6)</option>
                    <option value="JG6">Generalist (JG4-6)</option>
                    <option value="JG7">Lead (JG7-9)</option>
                    <option value="JG8">Lead (JG7-9)</option>
                    <option value="JG9">Lead (JG7-9)</option>
                    <option value="JG10">Business Partner (JG10-12)</option>
                    <option value="JG11">Business Partner (JG10-12)</option>
                    <option value="JG12">Business Partner (JG10-12)</option>
                    <option value="JG13">Strategic Partner (JG13-15)</option>
                    <option value="JG14">Strategic Partner (JG13-15)</option>
                    <option value="JG15">Strategic Partner (JG13-15)</option>
                  </select>
                </div>
                <input type="text" id="dept" placeholder="Department *" value="${this.profile.dept}">
                <input type="text" id="supervisor" placeholder="Supervisor Name *" value="${this.profile.supervisor}">
                <input type="email" id="supervisorEmail" placeholder="Supervisor Email *" value="${this.profile.supervisorEmail}">
                <button class="btn-primary" onclick="app.handleProfileSubmit()">Start Career Lattice ➜</button>
                <button class="btn-secondary" onclick="app.setState({screen: 'login'})">Back</button>
              </div>
            </div>
          `;
          document.getElementById('role').value = this.profile.role;
        } else if (this.screen === 'components') {
          app.innerHTML = `
            <div class="container">
              <div class="pilot-badge">🚀 PILOT PROGRAM</div>
              <div class="header">
                <h2>Welcome, ${this.profile.name}!</h2>
                <p>Your Career Development Journey in 3 Steps</p>
              </div>
              
              <div class="component-nav">
                <div class="component-tab ${this.component === 'selfcheck' ? 'active' : ''}" onclick="app.setState({component: 'selfcheck', screen: 'selfcheck'})">
                  <div class="component-icon">🔍</div>
                  <div class="component-step">STEP 1</div>
                  <h3>Self-Check</h3>
                  <p>Assess your competencies</p>
                </div>
                <div class="component-tab ${this.component === 'pathbuilding' ? 'active' : ''}" onclick="app.setState({component: 'pathbuilding', screen: 'pathbuilding'})">
                  <div class="component-icon">🛣️</div>
                  <div class="component-step">STEP 2</div>
                  <h3>Career Path Building</h3>
                  <p>Define your growth path</p>
                </div>
                <div class="component-tab ${this.component === 'idp' ? 'active' : ''}" onclick="app.setState({component: 'idp', screen: 'idp'})">
                  <div class="component-icon">📋</div>
                  <div class="component-step">STEP 3</div>
                  <h3>Individual Development Plan</h3>
                  <p>Create your action plan</p>
                </div>
              </div>

              <div class="button-row">
                <button class="btn-secondary" onclick="app.setState({screen: 'profile'})">← Back to Profile</button>
              </div>
            </div>
          `;
        } else if (this.screen === 'selfcheck') {
          app.innerHTML = `
            <div class="container">
              <div class="pilot-badge">🚀 PILOT PROGRAM</div>
              <div class="header">
                <h2>🔍 COMPONENT 1: SELF-CHECK</h2>
                <p>Assess your current competency levels (1 = Needs Improvement, 5 = Outstanding)</p>
              </div>
              
              <div class="competency-grid">
                ${this.getCompetencies().map(comp => `
                  <div class="competency-item">
                    <h4>${comp.name}</h4>
                    <p style="font-size: 12px; color: #666; margin-bottom: 12px;">${comp.desc}</p>
                    <div class="rating-scale">
                      ${[1, 2, 3, 4, 5].map(rating => `
                        <button class="rating-btn ${this.assessments[comp.id] === rating ? 'selected' : ''}" 
                        onclick="app.assessments['${comp.id}'] = ${rating}; app.render();">
                          ${rating}
                        </button>
                      `).join('')}
                    </div>
                  </div>
                `).join('')}
              </div>

              <div class="button-row">
                <button class="btn-secondary" onclick="app.setState({screen: 'components'})">← Back</button>
                <button class="btn-primary" onclick="app.setState({screen: 'pathbuilding'})">Next: Career Path Building ➜</button>
              </div>
            </div>
          `;
        } else if (this.screen === 'pathbuilding') {
          app.innerHTML = `
            <div class="container">
              <div class="pilot-badge">🚀 PILOT PROGRAM</div>
              <div class="header">
                <h2>🛣️ COMPONENT 2: CAREER PATH BUILDING</h2>
                <p>Define your growth direction and visualize your career roadmap</p>
              </div>

              <div class="section-header orange">STEP 1: SELECT YOUR GROWTH PATH</div>
              <div class="path-grid">
                <div class="path-card ${this.pathChoice === 'vertical' ? 'selected' : ''}" onclick="app.setState({pathChoice: 'vertical'})">
                  <div style="font-size: 32px; margin-bottom: 10px;">⬆️</div>
                  <h3>Vertical</h3>
                  <p>Leadership progression through grade levels</p>
                </div>
                <div class="path-card ${this.pathChoice === 'horizontal' ? 'selected' : ''}" onclick="app.setState({pathChoice: 'horizontal'})">
                  <div style="font-size: 32px; margin-bottom: 10px;">↔️</div>
                  <h3>Horizontal</h3>
                  <p>Deep expertise in current specialization</p>
                </div>
                <div class="path-card ${this.pathChoice === 'diagonal' ? 'selected' : ''}" onclick="app.setState({pathChoice: 'diagonal'})">
                  <div style="font-size: 32px; margin-bottom: 10px;">↗️</div>
                  <h3>Diagonal</h3>
                  <p>Combined growth & cross-functional expertise</p>
                </div>
              </div>

              ${this.pathChoice ? `
                <div class="section-header orange">STEP 2: SELECT YOUR BUSINESS AFFILIATE</div>
                <div class="selection-grid">
                  ${this.getAllAffiliates().map(affiliate => `
                    <div class="selection-card ${this.affiliateChoice === affiliate ? 'selected' : ''}" onclick="app.setState({affiliateChoice: '${affiliate}', businessUnitChoice: null})">
                      ${affiliate}<br><span style="font-size: 10px;">${this.getAffiliateNames()[affiliate]}</span>
                    </div>
                  `).join('')}
                </div>
              ` : ''}

              ${this.affiliateChoice ? `
                <div class="section-header orange">STEP 3: SELECT YOUR BUSINESS UNIT</div>
                <div class="selection-grid">
                  ${this.getBusinessUnits(this.affiliateChoice).map(bu => `
                    <div class="selection-card ${this.businessUnitChoice === bu ? 'selected' : ''}" onclick="app.setState({businessUnitChoice: '${bu}', functionalUnitChoice: null})">
                      ${bu}
                    </div>
                  `).join('')}
                </div>
              ` : ''}

              ${this.businessUnitChoice && this.getFunctionalUnits(this.affiliateChoice, this.businessUnitChoice).length > 0 ? `
                <div class="section-header orange">STEP 4: SELECT YOUR FUNCTIONAL UNIT</div>
                <div class="selection-grid">
                  ${this.getFunctionalUnits(this.affiliateChoice, this.businessUnitChoice).map(fu => `
                    <div class="selection-card ${this.functionalUnitChoice === fu ? 'selected' : ''}" onclick="app.setState({functionalUnitChoice: '${fu}'})">
                      ${fu}
                    </div>
                  `).join('')}
                </div>
              ` : ''}

              ${this.pathChoice && this.affiliateChoice && this.businessUnitChoice ? `
                <div style="margin-top: 30px;">
                  <div class="roadmap-container">
                    <div class="roadmap-title">🛣️ Your Career Progression Timeline</div>
                    <div style="overflow-x: auto; padding: 20px 10px;">
                      <div style="display: flex; gap: 8px; align-items: center; min-width: 100%;">
                        ${this.careerRoadmap && this.careerRoadmap.length > 0 ? this.careerRoadmap.map((stop, idx) => `
                          <div style="flex: 1; min-width: 120px; text-align: center;">
                            <div style="width: 80px; height: 80px; margin: 0 auto 10px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 28px; color: white; background: ${stop.type === 'current' ? '#607D8B' : stop.type === 'short' ? '#4CAF50' : stop.type === 'long' ? '#2196F3' : '#FF9800'}; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">${idx + 1}</div>
                            <div style="font-weight: 600; color: #0D1B3D; font-size: 12px; margin-bottom: 5px;">${stop.title}</div>
                            <div style="font-size: 10px; color: #666;">${stop.jg}</div>
                          </div>
                          ${idx < this.careerRoadmap.length - 1 ? '<div style="flex: 0.3; display: flex; align-items: center;"><div style="width: 100%; height: 2px; background: #ddd;"></div></div>' : ''}
                        `).join('') : '<p>Select your path and business unit to see your roadmap</p>'}
                      </div>
                    </div>
                  </div>
                </div>
              ` : ''}

              <div class="button-row">
                <button class="btn-secondary" onclick="app.setState({screen: 'components'})">← Back to Components</button>
                <button class="btn-primary" onclick="app.handlePathBuildingSubmit()" ${!this.pathChoice || !this.affiliateChoice || !this.businessUnitChoice ? 'disabled' : ''}>Next: Individual Development Plan ➜</button>
              </div>
            </div>
          `;
          if (this.pathChoice && this.affiliateChoice && this.businessUnitChoice && !this.careerRoadmap.length) {
            this.generateRoadmap();
          }
        } else if (this.screen === 'idp') {
          const currentTraining = this.getTrainingPortfolio()[this.getCurrentTrainingTrack()];
          const nextLevel = this.pathChoice ? this.getCareerRoadmaps()[this.pathChoice].find(r => r.type === 'short') : null;
          const nextTraining = nextLevel ? this.getTrainingPortfolio()[nextLevel.title] : null;
          const gaps = this.calculateGaps();
          
          app.innerHTML = `
            <div class="container">
              <div class="pilot-badge">🚀 PILOT PROGRAM</div>
              <div class="header">
                <h2>📋 COMPONENT 3: INDIVIDUAL DEVELOPMENT PLAN</h2>
                <p>Your personalized learning and development roadmap</p>
              </div>

              <div class="profile-summary">
                <h3>Your Career Direction</h3>
                <p>Path: <strong>${this.pathChoice ? this.pathChoice.toUpperCase() : 'Not Selected'}</strong> | Affiliate: <strong>${this.affiliateChoice || 'Not Selected'}</strong> | Business Unit: <strong>${this.businessUnitChoice || 'Not Selected'}</strong></p>
              </div>

              <!-- Gap Analysis -->
              <div class="gap-analysis">
                <h3>📊 Competency Gap Analysis</h3>
                <p style="font-size: 12px; color: #666; margin-bottom: 15px;">Comparing your self-assessment vs. requirements for <strong>${nextLevel ? nextLevel.title : 'Next Level'}</strong></p>
                ${Object.entries(gaps).map(([key, gap]) => `
                  <div class="gap-item">
                    <div class="gap-label">${gap.name}</div>
                    <div class="gap-your-score">
                      <div class="score ${gap.current >= 4 ? 'high' : gap.current >= 3 ? 'medium' : 'low'}">${gap.current}/5</div>
                      <div style="font-size: 11px; color: #666;">Your Score</div>
                      <div class="gap-bar"><div class="gap-bar-fill ${gap.current >= 4 ? '' : gap.current >= 3 ? 'yellow' : 'red'}" style="width: ${(gap.current / 5) * 100}%"></div></div>
                    </div>
                    <div class="gap-required">
                      <div class="score high">${gap.required}/5</div>
                      <div style="font-size: 11px; color: #666;">Required</div>
                      <div class="gap-bar"><div class="gap-bar-fill" style="width: ${(gap.required / 5) * 100}%"></div></div>
                    </div>
                  </div>
                `).join('')}
              </div>

              <div class="section-header">SHORT-TERM GOALS (1-2 Years)</div>
              <div class="goal-section">
                ${this.shortTermGoals.map(goal => `
                  <div class="goal-item">
                    <div class="goal-item-title">${goal.title}</div>
                    <div class="goal-item-desc">${goal.jg} • ${goal.level}</div>
                  </div>
                `).join('')}
              </div>

              <div class="section-header">LONG-TERM GOALS (3-5+ Years)</div>
              <div class="goal-section">
                ${this.longTermGoals.map(goal => `
                  <div class="goal-item">
                    <div class="goal-item-title">${goal.title}</div>
                    <div class="goal-item-desc">${goal.jg} • ${goal.level}</div>
                  </div>
                `).join('')}
              </div>

              <div class="training-section">
                <h3>📚 Recommended Training Programs</h3>
                <div style="margin-bottom: 20px;">
                  <h4 style="font-size: 13px; margin-bottom: 10px;">Current Level: <span class="grade-badge">${this.getCurrentTrainingTrack()}</span></h4>
                  <div class="training-item">
                    <div class="training-item-title">${currentTraining.name}</div>
                    <div class="training-item-desc">${currentTraining.programs.slice(0, 3).join(' • ')}</div>
                  </div>
                </div>
                ${nextTraining ? `
                  <div>
                    <h4 style="font-size: 13px; margin-bottom: 10px;">Next Level: <span class="grade-badge">${nextLevel.title}</span></h4>
                    <div class="training-item">
                      <div class="training-item-title">${nextTraining.name}</div>
                      <div class="training-item-desc">${nextTraining.programs.slice(0, 3).join(' • ')}</div>
                    </div>
                  </div>
                ` : ''}
              </div>

              <!-- AI Development Plan Section -->
              <div class="ai-analysis">
                <h3>🤖 AI-Powered Development Plan</h3>
                <p style="font-size: 13px; margin-bottom: 15px;">Get a comprehensive, personalized development plan generated by AI based on your competency gaps and career goals.</p>
                <button class="btn-ai" onclick="app.generateAIDevelopmentPlan()" ${this.aiLoading ? 'disabled' : ''}>
                  ${this.aiLoading ? '⚙️ Generating your personalized plan...' : '✨ Generate My Development Plan'}
                </button>
                ${this.aiAnalysis ? `
                  <div class="ai-results">
                    ${this.aiAnalysis.split('\n').map(line => {
                      if (line.startsWith('#')) return `<h4>${line.replace(/^#+\s*/, '')}</h4>`;
                      if (line.startsWith('-') || line.startsWith('•')) return `<li>${line.replace(/^[-•]\s*/, '')}</li>`;
                      if (line.trim() === '') return '<br>';
                      return `<p>${line}</p>`;
                    }).join('')}
                  </div>
                ` : ''}
              </div>

              <div class="aspirations-form">
                <label>✨ Career Aspirations & Notes (Optional)</label>
                <textarea id="aspirations" placeholder="Where do you see yourself in 5-10 years? What drives your career choices?">${this.aspirations}</textarea>
              </div>

              <div class="button-row">
                <button class="btn-secondary" onclick="app.setState({screen: 'components'})">← Back to Components</button>
                <button class="btn-primary" onclick="app.handleIDPSubmit()">Complete & Review ➜</button>
              </div>
            </div>
          `;
        } else if (this.screen === 'review') {
          app.innerHTML = `
            <div class="container">
              <div class="pilot-badge">🚀 PILOT PROGRAM</div>
              <div class="done-screen">
                <h1>✅</h1>
                <h2>Career Lattice Complete!</h2>
                <div class="profile-summary">
                  <h3>Your Development Journey</h3>
                  <p>✓ Self-Check: Competencies assessed</p>
                  <p>✓ Career Path: ${this.pathChoice ? this.pathChoice.toUpperCase() + ' path' : 'Path selected'} in ${this.affiliateChoice || 'Affiliate'} - ${this.businessUnitChoice || 'Business Unit'}</p>
                  <p>✓ IDP: Training programs identified</p>
                  <p>✓ Gap Analysis: Completed</p>
                  <p>✓ AI Development Plan: Generated</p>
                  <p>✓ Aspirations: Recorded</p>
                </div>

                <div style="margin-top: 40px; padding-top: 30px; border-top: 2px solid #ddd;">
                  <h3 style="color: #0D1B3D; margin-bottom: 20px; font-size: 16px;">📋 Next Steps</h3>
                  <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 20px;">
                    <button onclick="app.handleSaveRoadmap()" style="padding: 12px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 13px;">💾 Save</button>
                    <button onclick="app.handlePrint()" style="padding: 12px; background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 13px;">🖨️ Print</button>
                    <button onclick="app.handleSendCopy()" style="padding: 12px; background: #FF9800; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 13px;">📧 Send</button>
                    <button onclick="app.handleScheduleConversation()" style="padding: 12px; background: #9C27B0; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 13px;">📅 Schedule</button>
                    <button onclick="app.handleAssessmentRequest()" style="padding: 12px; background: #E65100; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 13px;">📝 Assessment</button>
                  </div>
                </div>

                <div class="button-row">
                  <button class="btn-secondary" onclick="app.handleLogout()">← Start Over</button>
                </div>
              </div>
            </div>
          `;
        }
      }

      handleProfileSubmit() {
        const name = document.getElementById('name').value;
        const employeeId = document.getElementById('employeeId').value;
        const email = document.getElementById('email').value;
        const role = document.getElementById('role').value;
        const dept = document.getElementById('dept').value;
        const supervisor = document.getElementById('supervisor').value;
        const supervisorEmail = document.getElementById('supervisorEmail').value;

        if (!name || !employeeId || !email || !role || !dept || !supervisor) {
          alert('⚠️ Please fill in all profile fields');
          return;
        }

        this.profile = { name, employeeId, email, role, dept, supervisor, supervisorEmail };
        this.setState({ screen: 'components' });
      }

      handlePathBuildingSubmit() {
        if (!this.pathChoice || !this.affiliateChoice || !this.businessUnitChoice) {
          alert('⚠️ Please complete all selections');
          return;
        }
        this.generateRoadmap();
        this.setState({ screen: 'idp' });
      }

      handleIDPSubmit() {
        const aspirations = document.getElementById('aspirations')?.value || '';
        this.aspirations = aspirations;
        this.setState({ screen: 'review' });
      }

      handleSaveRoadmap() {
        const data = JSON.stringify({ profile: this.profile, path: this.pathChoice, affiliate: this.affiliateChoice, businessUnit: this.businessUnitChoice, gaps: this.calculateGaps(), aiAnalysis: this.aiAnalysis, aspirations: this.aspirations }, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Career_Roadmap_${this.profile.name.replace(/\s/g, '_')}.json`;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);
        alert('✅ Saved!');
      }

      handlePrint() {
        window.print();
      }

      handleSendCopy() {
        if (!this.profile.email && !this.profile.supervisorEmail) {
          alert('⚠️ No email found. Please complete your profile first.');
          return;
        }
        const email = this.profile.supervisorEmail || this.profile.email;
        const subject = encodeURIComponent(`Career Roadmap - ${this.profile.name}`);
        const body = encodeURIComponent(`Hi,\n\nI've completed my Career Lattice roadmap with AI-generated development plan.\n\nPath: ${this.pathChoice ? this.pathChoice.toUpperCase() : 'Not Selected'}\nAffiliate: ${this.affiliateChoice || 'Not Selected'}\nBusiness Unit: ${this.businessUnitChoice || 'Not Selected'}\n\nLet's discuss my career goals!\n\nBest regards,\n${this.profile.name}`);
        const mailtoLink = `mailto:${email}?subject=${subject}&body=${body}`;
        window.location.href = mailtoLink;
        setTimeout(() => alert('✅ Email opened! Send the message to share your roadmap.'), 500);
      }

      handleScheduleConversation() {
        if (!this.profile.name) {
          alert('⚠️ Please complete your profile first.');
          return;
        }
        const calendarText = encodeURIComponent(`Career Conversation - ${this.profile.name}`);
        const calendarDetails = encodeURIComponent(`Discuss career roadmap and AI-generated development plan.\n\nPath: ${this.pathChoice || 'TBD'}\nAffiliate: ${this.affiliateChoice || 'TBD'}`);
        const url = `https://calendar.google.com/calendar/u/0/r/eventedit?text=${calendarText}&details=${calendarDetails}`;
        window.open(url, '_blank');
        alert('📅 Google Calendar opened! Schedule the conversation with your supervisor.');
      }

      handleAssessmentRequest() {
        if (!this.profile.name || !this.profile.employeeId) {
          alert('⚠️ Please complete your profile first.');
          return;
        }
        if (confirm(`Request Competency Assessment for ${this.profile.name}?`)) {
          const hrEmail = 'hr@pgb.com';
          const subject = encodeURIComponent(`Competency Assessment Request - ${this.profile.name} (${this.profile.employeeId})`);
          const body = encodeURIComponent(`Competency Assessment Request\n\nEmployee Name: ${this.profile.name}\nEmployee ID: ${this.profile.employeeId}\nEmail: ${this.profile.email}\nDepartment: ${this.profile.dept}\n\nCurrent Grade: ${this.profile.role}\nCareer Path Selected: ${this.pathChoice ? this.pathChoice.toUpperCase() : 'TBD'}\nBusiness Affiliate: ${this.affiliateChoice || 'TBD'}\n\nPlease schedule a competency assessment.\n\nThank you!`);
          const mailtoLink = `mailto:${hrEmail}?subject=${subject}&body=${body}`;
          window.location.href = mailtoLink;
          setTimeout(() => alert('✅ HR email opened! Send to request your assessment.'), 500);
        }
      }

      handleLogout() {
        this.profile = { name: '', employeeId: '', email: '', role: 'JG1', dept: '', supervisor: '', supervisorEmail: '' };
        this.assessments = {};
        this.pathChoice = null;
        this.affiliateChoice = null;
        this.businessUnitChoice = null;
        this.functionalUnitChoice = null;
        this.careerRoadmap = [];
        this.aspirations = '';
        this.aiAnalysis = null;
        this.setState({ screen: 'login' });
      }
    }

    const app = new CareerLatticePilot();
  </script>
</body>
</html>
