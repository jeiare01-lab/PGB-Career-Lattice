<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PGB Career Lattice | Construction & Manufacturing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; background: #FEF9F3; }
    .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    .header { padding: 15px 20px; background: #0D1B3D; color: white; border-radius: 8px; margin-bottom: 30px; text-align: center; }
    .header h2 { margin: 0 0 5px 0; }
    .header p { margin: 0; font-size: 13px; opacity: 0.9; }
    .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-content { text-align: center; }
    .login-content h1 { font-size: 40px; color: #0D1B3D; margin: 0 0 10px 0; }
    .login-content p { color: #666; margin: 0 0 40px 0; }
    .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 400px; }
    .btn { padding: 40px; background: white; border: 3px solid #E65100; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
    .btn-admin { border-color: #0D1B3D; }
    .btn:hover { opacity: 0.9; }
    .profile-form { display: grid; gap: 15px; }
    .profile-form input, .profile-form select { padding: 12px; border: 2px solid #E65100; border-radius: 4px; font-size: 14px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #0D1B3D; }
    .btn-primary { padding: 12px; background: #E65100; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; }
    .btn-secondary { padding: 12px; background: #ccc; color: #0D1B3D; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
    .path-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .path-card { padding: 20px; border-radius: 8px; cursor: pointer; border: 3px solid #ddd; background: white; transition: all 0.3s; }
    .path-card.selected { border-color: #E65100; background: #FEF9F3; }
    .path-card h3 { color: #0D1B3D; margin: 0 0 5px 0; }
    .path-card p { color: #666; margin: 0; font-size: 13px; }
    .assessment-grid { display: grid; gap: 20px; margin-bottom: 20px; }
    .assessment-item { padding: 15px; border: 2px solid #ddd; border-radius: 6px; background: #fafafa; }
    .assessment-item h4 { color: #0D1B3D; margin: 0 0 8px 0; font-size: 15px; }
    .assessment-item p { color: #666; margin: 0 0 12px 0; font-size: 13px; }
    .rating-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
    .rating-btn { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #ddd; background: white; color: #0D1B3D; font-weight: bold; cursor: pointer; font-size: 14px; transition: all 0.2s; }
    .rating-btn.selected { border-color: #E65100; background: #E65100; color: white; }
    .button-row { display: flex; gap: 10px; margin-top: 20px; }
    .button-row button { flex: 1; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
    .hidden { display: none; }
    .section-header { padding: 12px 15px; background: #0D1B3D; color: white; border-radius: 6px; margin-bottom: 15px; font-weight: bold; font-size: 14px; }
    .section-header.orange { background: #E65100; }
    .strength-box { padding: 15px; background: #e8f5e9; border-radius: 6px; }
    .strength-box h4 { color: #2e7d32; margin: 0 0 10px 0; }
    .strength-box ul { list-style: none; padding: 0; margin: 0; font-size: 13px; }
    .strength-box li { margin-bottom: 5px; }
    .development-box { padding: 15px; background: #ffebee; border-radius: 6px; }
    .development-box h4 { color: #c62828; margin: 0 0 10px 0; }
    .development-box ul { list-style: none; padding: 0; margin: 0; font-size: 13px; }
    .development-box li { margin-bottom: 5px; }
    .admin-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
    .metric-card { padding: 20px; background: white; border-radius: 8px; border: 3px solid #E65100; text-align: center; }
    .metric-card p:first-child { font-size: 32px; font-weight: bold; color: #0D1B3D; margin: 0 0 5px 0; }
    .metric-card p:last-child { color: #666; font-size: 12px; margin: 0; }
    .submissions-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .submissions-table th { padding: 10px; text-align: left; color: #0D1B3D; border-bottom: 2px solid #E65100; background: #FEF9F3; }
    .submissions-table td { padding: 10px; border-bottom: 1px solid #ddd; }
    .submissions-table tr:nth-child(even) { background: #fafafa; }
    .done-screen { text-align: center; padding: 60px 20px; }
    .done-screen h1 { font-size: 60px; margin: 0 0 20px 0; }
    .done-screen h2 { color: #0D1B3D; margin-bottom: 20px; }
    .profile-summary { padding: 20px; background: #FEF9F3; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #E65100; }
    .profile-summary h3 { color: #0D1B3D; margin: 0 0 15px 0; }
    .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; font-size: 14px; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    class CareerLattice {
      constructor() {
        this.screen = 'login';
        this.submissions = JSON.parse(localStorage.getItem('cl_submissions')) || [];
        this.profile = { name: '', employeeId: '', email: '', role: 'JG1', dept: '', supervisor: '', supervisorEmail: '' };
        this.pathChoice = null;
        this.scores = {};
        this.selectedSubmission = null;
        this.render();
      }

      setState(state) {
        Object.assign(this, state);
        this.render();
      }

      render() {
        const app = document.getElementById('app');
        
        if (this.screen === 'login') {
          app.innerHTML = `
            <div class="login-screen">
              <div class="login-content">
                <h1>🎯 PGB Career Lattice</h1>
                <p>Construction & Manufacturing | All Job Grades (JG1–JG15)</p>
                <div class="button-grid">
                  <button class="btn" onclick="app.handleLogin('employee')">👤 Employee</button>
                  <button class="btn btn-admin" onclick="app.handleLogin('admin')">🔐 HR Admin</button>
                </div>
              </div>
            </div>
          `;
        } else if (this.screen === 'profile') {
          app.innerHTML = `
            <div class="container">
              <div class="header">
                <h2>Step 1 of 5: Your Profile</h2>
                <p>Tell us about yourself</p>
              </div>
              <div class="profile-form">
                <input type="text" id="name" placeholder="Full Name *" value="${this.profile.name}">
                <input type="text" id="employeeId" placeholder="Employee ID *" value="${this.profile.employeeId}">
                <input type="email" id="email" placeholder="Email *" value="${this.profile.email}">
                <div class="form-group">
                  <label>Current Job Grade *</label>
                  <select id="role">
                    <option value="JG1">JG1 - Learner</option>
                    <option value="JG2">JG2 - Practitioner</option>
                    <option value="JG3">JG3 - Senior Practitioner</option>
                    <option value="JG4">JG4 - Generalist</option>
                    <option value="JG5">JG5 - Jr. Professional</option>
                    <option value="JG6">JG6 - Sr. Professional</option>
                    <option value="JG7">JG7 - Team Leader I</option>
                    <option value="JG8">JG8 - Team Leader II</option>
                    <option value="JG9">JG9 - Team Leader III</option>
                    <option value="JG10">JG10 - Asst Supervisor</option>
                    <option value="JG11">JG11 - Jr. Supervisor</option>
                    <option value="JG12">JG12 - Sr. Supervisor</option>
                    <option value="JG13">JG13 - Functional Unit Head</option>
                    <option value="JG14">JG14 - Jr. Manager</option>
                    <option value="JG15">JG15 - Sr. Manager</option>
                  </select>
                </div>
                <input type="text" id="dept" placeholder="Department *" value="${this.profile.dept}">
                <input type="text" id="supervisor" placeholder="Supervisor Name *" value="${this.profile.supervisor}">
                <input type="email" id="supervisorEmail" placeholder="Supervisor Email *" value="${this.profile.supervisorEmail}">
                <button class="btn-primary" onclick="app.handleProfileSubmit()">Continue ➜</button>
                <button class="btn-secondary" onclick="app.handleLogin('login')">Back</button>
              </div>
            </div>
          `;
          document.getElementById('role').value = this.profile.role;
        } else if (this.screen === 'pathChoice') {
          app.innerHTML = `
            <div class="container">
              <div class="header">
                <h2>Step 2 of 5: Choose Your Growth Path</h2>
                <p>Which direction excites you?</p>
              </div>
              <div class="path-grid">
                <div class="path-card ${this.pathChoice === 'vertical' ? 'selected' : ''}" onclick="app.setPath('vertical')">
                  <div style="font-size: 32px; margin-bottom: 10px;">⬆️</div>
                  <h3>Vertical</h3>
                  <p>Move up in your current function. Leadership growth.</p>
                </div>
                <div class="path-card ${this.pathChoice === 'horizontal' ? 'selected' : ''}" onclick="app.setPath('horizontal')">
                  <div style="font-size: 32px; margin-bottom: 10px;">↔️</div>
                  <h3>Horizontal</h3>
                  <p>Explore new functions. Broaden expertise.</p>
                </div>
                <div class="path-card ${this.pathChoice === 'diagonal' ? 'selected' : ''}" onclick="app.setPath('diagonal')">
                  <div style="font-size: 32px; margin-bottom: 10px;">↗️</div>
                  <h3>Diagonal</h3>
                  <p>Combine growth + skill expansion.</p>
                </div>
              </div>
              <div class="button-row">
                <button class="btn-secondary" onclick="app.setState({screen: 'profile'})">Back</button>
                <button class="btn-primary" onclick="app.setState({screen: 'assessment'})" ${!this.pathChoice ? 'disabled' : ''}>Next ➜</button>
              </div>
            </div>
          `;
        } else if (this.screen === 'assessment') {
          const competencies = [
            { name: 'Job Knowledge & Skills', desc: 'Applies solid expertise reliably in role.' },
            { name: 'Decision Making & Problem Solving', desc: 'Makes sound, timely decisions.' },
            { name: 'Communication', desc: 'Communicates clearly and adapts to audience.' },
            { name: 'Planning & Organizing', desc: 'Organizes effectively and manages timelines.' },
            { name: 'Leadership', desc: 'Leads teams, fosters collaboration.' },
            { name: 'Customer Focus', desc: 'Delivers quality service reliably.' }
          ];
          const personalAttributes = [
            { name: 'Pagsalig (Built on Trust)', desc: 'Integrity, reliability, transparency.' },
            { name: 'Pagkugi (We Keep Going)', desc: 'Initiative, energy, resilience.' },
            { name: 'Hiniusang Pagtutok (We Get Things Done Together)', desc: 'Teamwork, collaboration, focus.' },
            { name: 'Pagpalambo (We Strive to Make Things Better)', desc: 'Innovation, learning, improvement.' }
          ];

          let html = `
            <div class="container">
              <div class="header">
                <h2>Step 3 of 5: Competency & Values Assessment</h2>
                <p>Rate yourself 1-5 on each dimension</p>
              </div>
              <div class="section-header orange">SECTION II: COMPETENCIES — Weight 60%</div>
          `;

          competencies.forEach((comp, idx) => {
            html += `
              <div class="assessment-item">
                <h4>${comp.name}</h4>
                <p>${comp.desc}</p>
                <div class="rating-buttons">
                  ${[1,2,3,4,5].map(n => `
                    <button class="rating-btn ${this.scores[comp.name] === n ? 'selected' : ''}" onclick="app.setScore('${comp.name}', ${n})">${n}</button>
                  `).join('')}
                </div>
              </div>
            `;
          });

          html += `<div class="section-header">SECTION III: PERSONAL ATTRIBUTES — Weight 20% (PGB Corporate Values)</div>`;

          personalAttributes.forEach((attr, idx) => {
            html += `
              <div class="assessment-item" style="border-color: #0D1B3D; background: #f0f8ff;">
                <h4>${attr.name}</h4>
                <p>${attr.desc}</p>
                <div class="rating-buttons">
                  ${[1,2,3,4,5].map(n => `
                    <button class="rating-btn ${this.scores[attr.name] === n ? 'selected' : ''}" onclick="app.setScore('${attr.name}', ${n})">${n}</button>
                  `).join('')}
                </div>
              </div>
            `;
          });

          html += `
              <div class="button-row">
                <button class="btn-secondary" onclick="app.setState({screen: 'pathChoice'})">Back</button>
                <button class="btn-primary" onclick="app.handleAssessmentSubmit()">Generate IDP ➜</button>
              </div>
            </div>
          `;

          app.innerHTML = html;
        } else if (this.screen === 'review') {
          const allDimensions = 10; // 6 + 4
          const avg = (Object.values(this.scores).reduce((a, b) => a + b, 0) / allDimensions).toFixed(1);
          
          app.innerHTML = `
            <div class="container">
              <div class="header">
                <h2>Step 4 of 5: Your Development Plan</h2>
              </div>
              <div class="profile-summary">
                <h3>📊 Your Profile & Assessment</h3>
                <div class="profile-grid">
                  <div><strong>Name:</strong> ${this.profile.name}</div>
                  <div><strong>Job Grade:</strong> ${this.profile.role}</div>
                  <div><strong>Department:</strong> ${this.profile.dept}</div>
                  <div><strong>Path Choice:</strong> ${this.pathChoice.charAt(0).toUpperCase() + this.pathChoice.slice(1)}</div>
                  <div><strong>Average Score:</strong> <span style="color: #E65100; font-weight: bold; font-size: 16px;">${avg}/5.0</span></div>
                </div>
              </div>
              <div style="padding: 15px; background: #fff3cd; border-radius: 6px; margin-bottom: 20px; font-size: 13px; color: #856404;">
                <strong>🎯 Key Initiatives for Next 12 Months:</strong>
                <ul style="margin-top: 10px; padding-left: 20px;">
                  <li>Core Competency Development (Leadership Dev Program, bi-weekly 1:1s)</li>
                  <li>Skill Building (STEP UP V2.0, certifications, cross-functional projects)</li>
                  <li>Leadership & Culture (Career Lattice Workshops, ACE Sustainability, AI Lab Series)</li>
                  <li>Measurement (Quarterly EOS Rocks, monthly check-ins, 360 feedback at 6 months)</li>
                </ul>
              </div>
              <div class="button-row">
                <button class="btn-secondary" onclick="app.setState({screen: 'assessment'})">Back</button>
                <button class="btn-primary" onclick="app.handleFinalSubmit('${avg}')">Submit & Schedule ✓</button>
              </div>
            </div>
          `;
        } else if (this.screen === 'done') {
          app.innerHTML = `
            <div class="container">
              <div class="done-screen">
                <h1>✅</h1>
                <h2>Career Conversation Scheduled!</h2>
                <div class="profile-summary">
                  <p>✓ Calendar invite sent to <strong>${this.profile.supervisor}</strong></p>
                  <p>✓ Your IDP has been submitted to HR</p>
                  <p>✓ 45-minute career conversation scheduled</p>
                  <p>✓ Supervisor can view your full development plan</p>
                </div>
                <button class="btn-primary" onclick="app.handleLogout()">Logout</button>
              </div>
            </div>
          `;
        } else if (this.screen === 'admin') {
          let html = `
            <div class="container">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h1 style="color: #0D1B3D; margin: 0;">📊 HR Admin Dashboard</h1>
                <button class="btn-secondary" onclick="app.handleLogout()">🔒 Logout</button>
              </div>
              <div class="admin-metrics">
                <div class="metric-card">
                  <p>${this.submissions.length}</p>
                  <p>Submissions (Target: 200)</p>
                </div>
                <div class="metric-card" style="border-color: #0D1B3D;">
                  <p>${Math.round((this.submissions.length / 200) * 100)}%</p>
                  <p>Adoption Rate</p>
                </div>
                <div class="metric-card" style="border: none; text-align: center; font-size: 12px;">
                  <p style="color: #0D1B3D; margin: 3px 0;">⬆️ ${this.submissions.filter(s => s.path === 'vertical').length} Vertical</p>
                  <p style="color: #0D1B3D; margin: 3px 0;">↔️ ${this.submissions.filter(s => s.path === 'horizontal').length} Horizontal</p>
                  <p style="color: #0D1B3D; margin: 3px 0;">↗️ ${this.submissions.filter(s => s.path === 'diagonal').length} Diagonal</p>
                </div>
              </div>
              <div style="background: white; border-radius: 8px; padding: 20px;">
                <h2 style="color: #0D1B3D; margin-bottom: 15px;">All Submissions (${this.submissions.length})</h2>
                ${this.submissions.length === 0 ? `
                  <p style="text-align: center; color: #999; padding: 40px 20px;">No submissions yet.</p>
                ` : `
                  <table class="submissions-table">
                    <thead>
                      <tr>
                        <th>Name</th>
                        <th>Grade</th>
                        <th>Department</th>
                        <th>Path</th>
                        <th>Score</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${this.submissions.map((sub, i) => `
                        <tr>
                          <td style="font-weight: 600; color: #0D1B3D;">${sub.name}</td>
                          <td>${sub.role}</td>
                          <td>${sub.dept}</td>
                          <td style="text-align: center; font-size: 16px;">
                            ${sub.path === 'vertical' ? '⬆️' : sub.path === 'horizontal' ? '↔️' : '↗️'}
                          </td>
                          <td style="text-align: center; color: #E65100; font-weight: bold;">${sub.avgScore}</td>
                        </tr>
                      `).join('')}
                    </tbody>
                  </table>
                `}
              </div>
            </div>
          `;
          app.innerHTML = html;
        }
      }

      handleLogin(type) {
        if (type === 'employee') {
          this.setState({ screen: 'profile' });
        } else if (type === 'admin') {
          this.setState({ screen: 'admin' });
        } else {
          this.setState({ screen: 'login' });
        }
      }

      handleProfileSubmit() {
        const name = document.getElementById('name').value;
        const employeeId = document.getElementById('employeeId').value;
        const email = document.getElementById('email').value;
        const role = document.getElementById('role').value;
        const dept = document.getElementById('dept').value;
        const supervisor = document.getElementById('supervisor').value;
        const supervisorEmail = document.getElementById('supervisorEmail').value;

        if (!name || !employeeId || !email || !role || !dept || !supervisor) {
          alert('⚠️ Please fill in all profile fields');
          return;
        }

        this.profile = { name, employeeId, email, role, dept, supervisor, supervisorEmail };
        this.setState({ screen: 'pathChoice' });
      }

      setPath(path) {
        this.setState({ pathChoice: path });
      }

      setScore(dimension, score) {
        this.scores[dimension] = score;
        this.render();
      }

      handleAssessmentSubmit() {
        const allDimensions = 10; // 6 competencies + 4 attributes
        if (Object.keys(this.scores).length < allDimensions) {
          alert(`⚠️ Please rate all ${allDimensions} dimensions before continuing`);
          return;
        }
        this.setState({ screen: 'review' });
      }

      handleFinalSubmit(avg) {
        const newSubmission = {
          ...this.profile,
          path: this.pathChoice,
          avgScore: avg,
          timestamp: new Date().toISOString()
        };
        const updated = [...this.submissions, newSubmission];
        this.submissions = updated;
        localStorage.setItem('cl_submissions', JSON.stringify(updated));
        alert('✅ Career Lattice submitted!\n\nCalendar invite will be sent to ' + this.profile.supervisor);
        this.setState({ screen: 'done' });
      }

      handleLogout() {
        this.profile = { name: '', employeeId: '', email: '', role: 'JG1', dept: '', supervisor: '', supervisorEmail: '' };
        this.pathChoice = null;
        this.scores = {};
        this.setState({ screen: 'login' });
      }
    }

    const app = new CareerLattice();
  </script>
</body>
</html>
