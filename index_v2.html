<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PGB Career Lattice | Construction & Manufacturing</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function CareerLattice() {
      const [screen, setScreen] = useState('login');
      const [submissions, setSubmissions] = useState(() => JSON.parse(localStorage.getItem('cl_submissions')) || []);
      const [profile, setProfile] = useState({ name: '', employeeId: '', email: '', role: 'JG1', dept: '', supervisor: '', supervisorEmail: '' });
      const [pathChoice, setPathChoice] = useState(null);
      const [scores, setScores] = useState({});
      const [selectedSubmission, setSelectedSubmission] = useState(null);

      const colors = { navy: '#0D1B3D', cream: '#FEF9F3', orange: '#E65100' };
      
      // SECTION II: Competencies (6)
      const competencies = [
        { name: 'Job Knowledge & Skills', desc: 'Applies solid expertise reliably in role. Performs tasks independently with accuracy.' },
        { name: 'Decision Making & Problem Solving', desc: 'Makes sound, timely decisions. Resolves issues effectively using structured analysis.' },
        { name: 'Communication', desc: 'Communicates clearly and reliably. Adapts style to audience needs. Listens attentively.' },
        { name: 'Planning & Organizing', desc: 'Organizes effectively and reliably. Aligns daily work with team goals. Manages timelines.' },
        { name: 'Leadership', desc: 'Leads small teams effectively. Fosters collaboration and accountability. Aligns team efforts with goals.' },
        { name: 'Customer Focus', desc: 'Delivers quality service reliably. Adapts solutions to customer needs. Builds trust through responsiveness.' }
      ];

      // SECTION III: Personal Attributes (4) - PGB Corporate Values
      const personalAttributes = [
        { name: 'Pagsalig (Built on Trust)', desc: 'Integrity, reliability, keeps commitments. Honest, sincere, and respectful. Transparent in communication.' },
        { name: 'Pagkugi (We Keep Going)', desc: 'Initiative, energy, resilience under pressure. Completes tasks diligently. Maintains composure and focus.' },
        { name: 'Hiniusang Pagtutok (We Get Things Done Together)', desc: 'Teamwork, collaboration, shared focus on goals. Cooperative and receptive. Meets deadlines and priorities.' },
        { name: 'Pagpalambo (We Strive to Make Things Better)', desc: 'Innovation, learning, continuous improvement. Self-starter, resourceful. Seeks ways to improve work and performance.' }
      ];

      const jobGrades = [
        { group: 'SPECIALIST or Individual Contributor', grades: [
          { code: 'JG1', title: 'Learner', desc: 'Learn procedures, follow steps, assigned tasks. Close supervision.' },
          { code: 'JG2', title: 'Practitioner', desc: 'Execute tasks independently, follow established procedures. Monthly check-ins.' },
          { code: 'JG3', title: 'Senior Practitioner', desc: 'Own specific areas, mentor 1–2 peers, input on procedures. Go-to person.' }
        ]},
        { group: 'GENERALIST or Professional', grades: [
          { code: 'JG4', title: 'Generalist', desc: 'Lead some projects, solve non-routine problems. Cross-functional influence.' },
          { code: 'JG5', title: 'Jr. Professional', desc: 'Subject Matter Expert. Own complex initiatives, build frameworks, thought leader.' },
          { code: 'JG6', title: 'Sr. Professional', desc: 'Oversee small team (2–4) OR lead major initiative. People management OR project accountability.' }
        ]},
        { group: 'LEAD or Officer', grades: [
          { code: 'JG7', title: 'Team Leader or Officer I', desc: 'Manage team (3–8 people), own budget (100K–500K), drive departmental goals.' },
          { code: 'JG8', title: 'Jr. Team Lead or Officer II', desc: 'Manage 5–10 people, manage cross-functional projects, broader accountability.' },
          { code: 'JG9', title: 'Sr. Team Lead or Officer III', desc: 'Oversee department or major business area, set strategy, manage senior staff.' }
        ]},
        { group: 'BUSINESS PARTNER or Supervisor', grades: [
          { code: 'JG10', title: 'Asst Supervisor', desc: 'Oversee major function across organization. Manage 10–20+ people. Budget: often 2M+.' },
          { code: 'JG11', title: 'Jr. Supervisor', desc: 'More on management side, less day-to-day execution. Cross-functional influence.' },
          { code: 'JG12', title: 'Sr. Supervisor', desc: 'Focus on planning, organizational health, external relationships. Strategy-setting.' }
        ]},
        { group: 'STRATEGIC PARTNER or Managerial', grades: [
          { code: 'JG13', title: 'Functional Unit Head', desc: 'Strategic direction for Business Unit or function. Board-level engagement.' },
          { code: 'JG14', title: 'Jr. Manager', desc: 'Formal external representation (clients, partners, media). Strategic direction.' },
          { code: 'JG15', title: 'Sr. Manager', desc: 'Board-level thinking. Enterprise-wide strategic leadership. Organizational transformation.' }
        ]}
      ];

      const handleSubmit = () => {
        if (!profile.name || !profile.employeeId || !profile.email || !profile.dept || !profile.supervisor) {
          alert('⚠️ Please fill in all profile fields');
          return;
        }
        setScreen('pathChoice');
      };

      // LOGIN
      if (screen === 'login') {
        return (
          <div style={{ minHeight: '100vh', backgroundColor: colors.cream, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <div style={{ textAlign: 'center' }}>
              <h1 style={{ fontSize: '40px', color: colors.navy, margin: '0 0 10px 0' }}>🎯 PGB Career Lattice</h1>
              <p style={{ color: '#666', margin: '0 0 40px 0' }}>Construction & Manufacturing | All Job Grades (JG1–JG15)</p>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '15px', maxWidth: '400px' }}>
                <button onClick={() => setScreen('profile')} style={{ padding: '40px', backgroundColor: 'white', border: `3px solid ${colors.orange}`, borderRadius: '8px', cursor: 'pointer', fontWeight: 'bold', fontSize: '16px' }}>👤 Employee</button>
                <button onClick={() => setScreen('admin')} style={{ padding: '40px', backgroundColor: 'white', border: `3px solid ${colors.navy}`, borderRadius: '8px', cursor: 'pointer', fontWeight: 'bold', fontSize: '16px' }}>🔐 HR Admin</button>
              </div>
            </div>
          </div>
        );
      }

      // ADMIN DASHBOARD
      if (screen === 'admin') {
        return (
          <div style={{ minHeight: '100vh', backgroundColor: colors.cream, padding: '20px' }}>
            <div style={{ maxWidth: '1200px', margin: '0 auto' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '30px' }}>
                <h1 style={{ color: colors.navy, margin: 0 }}>📊 HR Admin Dashboard</h1>
                <button onClick={() => setScreen('login')} style={{ padding: '10px 20px', backgroundColor: colors.navy, color: 'white', border: 'none', borderRadius: '4px', cursor: 'pointer', fontWeight: '600' }}>🔒 Logout</button>
              </div>

              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '15px', marginBottom: '30px' }}>
                <div style={{ padding: '20px', backgroundColor: 'white', borderRadius: '8px', border: `3px solid ${colors.orange}`, textAlign: 'center' }}>
                  <p style={{ fontSize: '32px', fontWeight: 'bold', color: colors.navy, margin: '0 0 5px 0' }}>{submissions.length}</p>
                  <p style={{ color: '#666', fontSize: '12px', margin: 0 }}>Submissions (Target: 200)</p>
                </div>
                <div style={{ padding: '20px', backgroundColor: 'white', borderRadius: '8px', border: `3px solid ${colors.navy}`, textAlign: 'center' }}>
                  <p style={{ fontSize: '32px', fontWeight: 'bold', color: colors.navy, margin: '0 0 5px 0' }}>{Math.round((submissions.length / 200) * 100)}%</p>
                  <p style={{ color: '#666', fontSize: '12px', margin: 0 }}>Adoption Rate</p>
                </div>
                <div style={{ padding: '20px', backgroundColor: 'white', borderRadius: '8px', textAlign: 'center', fontSize: '12px' }}>
                  <p style={{ color: colors.navy, margin: '3px 0' }}>⬆️ {submissions.filter(s => s.path === 'vertical').length} Vertical</p>
                  <p style={{ color: colors.navy, margin: '3px 0' }}>↔️ {submissions.filter(s => s.path === 'horizontal').length} Horizontal</p>
                  <p style={{ color: colors.navy, margin: '3px 0' }}>↗️ {submissions.filter(s => s.path === 'diagonal').length} Diagonal</p>
                </div>
              </div>

              <div style={{ backgroundColor: 'white', borderRadius: '8px', padding: '20px' }}>
                <h2 style={{ color: colors.navy, marginBottom: '15px' }}>All Submissions ({submissions.length})</h2>
                {submissions.length === 0 ? (
                  <p style={{ textAlign: 'center', color: '#999', padding: '40px 20px' }}>No submissions yet. Employees can start the Career Lattice journey.</p>
                ) : (
                  <div style={{ overflowX: 'auto' }}>
                    <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '13px' }}>
                      <thead>
                        <tr style={{ borderBottom: `2px solid ${colors.orange}`, backgroundColor: colors.cream }}>
                          <th style={{ padding: '10px', textAlign: 'left', color: colors.navy }}>Name</th>
                          <th style={{ padding: '10px', textAlign: 'left', color: colors.navy }}>Grade</th>
                          <th style={{ padding: '10px', textAlign: 'left', color: colors.navy }}>Department</th>
                          <th style={{ padding: '10px', textAlign: 'center', color: colors.navy }}>Path</th>
                          <th style={{ padding: '10px', textAlign: 'center', color: colors.navy }}>Score</th>
                          <th style={{ padding: '10px', textAlign: 'center', color: colors.navy }}>Action</th>
                        </tr>
                      </thead>
                      <tbody>
                        {submissions.map((sub, i) => (
                          <tr key={i} style={{ borderBottom: '1px solid #ddd', backgroundColor: i % 2 === 0 ? '#fafafa' : 'white' }}>
                            <td style={{ padding: '10px', fontWeight: '600', color: colors.navy }}>{sub.name}</td>
                            <td style={{ padding: '10px' }}>{sub.role}</td>
                            <td style={{ padding: '10px' }}>{sub.dept}</td>
                            <td style={{ padding: '10px', textAlign: 'center', fontSize: '16px' }}>
                              {sub.path === 'vertical' ? '⬆️' : sub.path === 'horizontal' ? '↔️' : '↗️'}
                            </td>
                            <td style={{ padding: '10px', textAlign: 'center', color: colors.orange, fontWeight: 'bold' }}>{sub.avgScore}</td>
                            <td style={{ padding: '10px', textAlign: 'center' }}>
                              <button onClick={() => setSelectedSubmission(sub)} style={{ padding: '5px 12px', backgroundColor: colors.navy, color: 'white', border: 'none', borderRadius: '4px', cursor: 'pointer', fontSize: '12px', marginRight: '5px', fontWeight: '600' }}>View</button>
                              <button onClick={() => setSubmissions(submissions.filter((_, idx) => idx !== i))} style={{ padding: '5px 12px', backgroundColor: '#dc3545', color: 'white', border: 'none', borderRadius: '4px', cursor: 'pointer', fontSize: '12px', fontWeight: '600' }}>Del</button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            </div>

            {selectedSubmission && (
              <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, backgroundColor: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px', zIndex: 1000 }}>
                <div style={{ backgroundColor: 'white', borderRadius: '8px', maxWidth: '600px', width: '100%', padding: '30px', maxHeight: '80vh', overflow: 'auto' }}>
                  <h2 style={{ color: colors.navy, margin: '0 0 20px 0' }}>{selectedSubmission.name}</h2>
                  <div style={{ marginBottom: '20px', fontSize: '14px', lineHeight: '1.8' }}>
                    <p style={{ margin: '8px 0' }}><strong>Employee ID:</strong> {selectedSubmission.employeeId}</p>
                    <p style={{ margin: '8px 0' }}><strong>Email:</strong> {selectedSubmission.email}</p>
                    <p style={{ margin: '8px 0' }}><strong>Job Grade:</strong> {selectedSubmission.role}</p>
                    <p style={{ margin: '8px 0' }}><strong>Department:</strong> {selectedSubmission.dept}</p>
                    <p style={{ margin: '8px 0' }}><strong>Path Choice:</strong> {selectedSubmission.path.charAt(0).toUpperCase() + selectedSubmission.path.slice(1)}</p>
                    <p style={{ margin: '8px 0' }}><strong>Average Score:</strong> {selectedSubmission.avgScore}/5.0</p>
                    <p style={{ margin: '8px 0' }}><strong>Supervisor:</strong> {selectedSubmission.supervisor}</p>
                  </div>
                  <button onClick={() => setSelectedSubmission(null)} style={{ width: '100%', padding: '10px', backgroundColor: colors.orange, color: 'white', border: 'none', borderRadius: '4px', cursor: 'pointer', fontWeight: '600' }}>Close</button>
                </div>
              </div>
            )}
          </div>
        );
      }

      // PROFILE
      if (screen === 'profile') {
        return (
          <div style={{ maxWidth: '600px', margin: '0 auto', padding: '40px 20px' }}>
            <div style={{ padding: '15px 20px', backgroundColor: colors.navy, color: 'white', borderRadius: '8px', marginBottom: '20px', textAlign: 'center' }}>
              <h2 style={{ margin: '0 0 5px 0' }}>Step 1 of 5: Your Profile</h2>
              <p style={{ margin: 0, fontSize: '13px', opacity: 0.9 }}>Tell us about yourself</p>
            </div>

            <div style={{ display: 'grid', gap: '15px' }}>
              <input type="text" placeholder="Full Name *" value={profile.name} onChange={(e) => setProfile({...profile, name: e.target.value})} style={{ padding: '12px', borderRadius: '4px', border: `2px solid ${colors.orange}`, fontSize: '14px', boxSizing: 'border-box' }} />
              <input type="text" placeholder="Employee ID *" value={profile.employeeId} onChange={(e) => setProfile({...profile, employeeId: e.target.value})} style={{ padding: '12px', borderRadius: '4px', border: `2px solid ${colors.orange}`, fontSize: '14px', boxSizing: 'border-box' }} />
              <input type="email" placeholder="Email *" value={profile.email} onChange={(e) => setProfile({...profile, email: e.target.value})} style={{ padding: '12px', borderRadius: '4px', border: `2px solid ${colors.orange}`, fontSize: '14px', boxSizing: 'border-box' }} />
              
              <div>
                <label style={{ display: 'block', marginBottom: '8px', fontWeight: '600', color: colors.navy }}>Current Job Grade *</label>
                <select value={profile.role} onChange={(e) => setProfile({...profile, role: e.target.value})} style={{ width: '100%', padding: '12px', borderRadius: '4px', border: `2px solid ${colors.orange}`, fontSize: '14px', boxSizing: 'border-box' }}>
                  <option value="">-- Select Job Grade --</option>
                  {jobGrades.map((group, gIdx) => (
                    <optgroup key={gIdx} label={group.group}>
                      {group.grades.map((grade, gIdx) => (
                        <option key={gIdx} value={grade.code}>{grade.code} - {grade.title}</option>
                      ))}
                    </optgroup>
                  ))}
                </select>
                {profile.role && (
                  <p style={{ fontSize: '12px', color: '#666', marginTop: '8px', fontStyle: 'italic' }}>
                    {jobGrades.flatMap(g => g.grades).find(g => g.code === profile.role)?.desc}
                  </p>
                )}
              </div>

              <input type="text" placeholder="Department *" value={profile.dept} onChange={(e) => setProfile({...profile, dept: e.target.value})} style={{ padding: '12px', borderRadius: '4px', border: `2px solid ${colors.orange}`, fontSize: '14px', boxSizing: 'border-box' }} />
              <input type="text" placeholder="Supervisor Name *" value={profile.supervisor} onChange={(e) => setProfile({...profile, supervisor: e.target.value})} style={{ padding: '12px', borderRadius: '4px', border: `2px solid ${colors.orange}`, fontSize: '14px', boxSizing: 'border-box' }} />
              <input type="email" placeholder="Supervisor Email *" value={profile.supervisorEmail} onChange={(e) => setProfile({...profile, supervisorEmail: e.target.value})} style={{ padding: '12px', borderRadius: '4px', border: `2px solid ${colors.orange}`, fontSize: '14px', boxSizing: 'border-box' }} />

              <button onClick={handleSubmit} style={{ padding: '12px', backgroundColor: colors.orange, color: 'white', border: 'none', borderRadius: '4px', fontWeight: 'bold', cursor: 'pointer', fontSize: '16px' }}>Continue ➜</button>
              <button onClick={() => setScreen('login')} style={{ padding: '12px', backgroundColor: '#ccc', color: colors.navy, border: 'none', borderRadius: '4px', cursor: 'pointer', fontWeight: '600' }}>Back</button>
            </div>
          </div>
        );
      }

      // PATH CHOICE
      if (screen === 'pathChoice') {
        return (
          <div style={{ maxWidth: '900px', margin: '0 auto', padding: '40px 20px' }}>
            <div style={{ padding: '15px 20px', backgroundColor: colors.navy, color: 'white', borderRadius: '8px', marginBottom: '30px', textAlign: 'center' }}>
              <h2 style={{ margin: '0 0 5px 0' }}>Step 2 of 5: Choose Your Growth Path</h2>
              <p style={{ margin: 0, fontSize: '13px', opacity: 0.9 }}>Which direction excites you?</p>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '15px', marginBottom: '20px' }}>
              {[
                { type: 'vertical', icon: '⬆️', title: 'Vertical', desc: 'Move up in your current function. Leadership growth.' },
                { type: 'horizontal', icon: '↔️', title: 'Horizontal', desc: 'Explore new functions. Broaden expertise.' },
                { type: 'diagonal', icon: '↗️', title: 'Diagonal', desc: 'Combine growth + skill expansion.' }
              ].map((path) => (
                <div key={path.type} onClick={() => setPathChoice(path.type)} style={{
                  padding: '20px', borderRadius: '8px', cursor: 'pointer',
                  border: `3px solid ${pathChoice === path.type ? colors.orange : '#ddd'}`,
                  backgroundColor: pathChoice === path.type ? colors.cream : 'white',
                  transition: 'all 0.3s ease'
                }}>
                  <div style={{ fontSize: '32px', marginBottom: '10px' }}>{path.icon}</div>
                  <h3 style={{ color: colors.navy, margin: '0 0 5px 0' }}>{path.title}</h3>
                  <p style={{ color: '#666', margin: 0, fontSize: '13px' }}>{path.desc}</p>
                </div>
              ))}
            </div>

            <div style={{ display: 'flex', gap: '10px' }}>
              <button onClick={() => setScreen('profile')} style={{ flex: 1, padding: '12px', backgroundColor: '#ccc', color: colors.navy, border: 'none', borderRadius: '4px', cursor: 'pointer', fontWeight: '600' }}>Back</button>
              <button onClick={() => pathChoice && setScreen('assessment')} disabled={!pathChoice} style={{ flex: 1, padding: '12px', backgroundColor: colors.orange, color: 'white', border: 'none', borderRadius: '4px', cursor: 'pointer', fontWeight: 'bold', opacity: pathChoice ? 1 : 0.5 }}>Next ➜</button>
            </div>
          </div>
        );
      }

      // ASSESSMENT (6 Competencies + 4 Personal Attributes)
      if (screen === 'assessment') {
        return (
          <div style={{ maxWidth: '900px', margin: '0 auto', padding: '40px 20px' }}>
            <div style={{ padding: '15px 20px', backgroundColor: colors.navy, color: 'white', borderRadius: '8px', marginBottom: '30px', textAlign: 'center' }}>
              <h2 style={{ margin: '0 0 5px 0' }}>Step 3 of 5: Competency & Values Assessment</h2>
              <p style={{ margin: 0, fontSize: '13px', opacity: 0.9 }}>Rate yourself 1-5 on each dimension (based on PGB Performance Appraisal)</p>
            </div>

            {/* SECTION II: Competencies */}
            <div style={{ marginBottom: '30px' }}>
              <div style={{ padding: '12px 15px', backgroundColor: colors.orange, color: 'white', borderRadius: '6px', marginBottom: '15px', fontWeight: 'bold' }}>
                SECTION II: COMPETENCIES — Weight 60%
              </div>
              <div style={{ display: 'grid', gap: '20px' }}>
                {competencies.map((comp, idx) => (
                  <div key={idx} style={{ padding: '15px', border: '2px solid #ddd', borderRadius: '6px', backgroundColor: '#fafafa' }}>
                    <h4 style={{ color: colors.navy, margin: '0 0 8px 0', fontSize: '15px', fontWeight: '600' }}>{comp.name}</h4>
                    <p style={{ color: '#666', margin: '0 0 12px 0', fontSize: '13px' }}>{comp.desc}</p>
                    <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
                      {[1, 2, 3, 4, 5].map((n) => (
                        <button
                          key={n}
                          onClick={() => setScores({ ...scores, [comp.name]: n })}
                          style={{
                            width: '40px', height: '40px', borderRadius: '50%',
                            border: `2px solid ${scores[comp.name] === n ? colors.orange : '#ddd'}`,
                            backgroundColor: scores[comp.name] === n ? colors.orange : 'white',
                            color: scores[comp.name] === n ? 'white' : colors.navy,
                            fontWeight: 'bold', cursor: 'pointer', fontSize: '14px', transition: 'all 0.2s'
                          }}
                        >
                          {n}
                        </button>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* SECTION III: Personal Attributes */}
            <div style={{ marginBottom: '30px' }}>
              <div style={{ padding: '12px 15px', backgroundColor: colors.navy, color: 'white', borderRadius: '6px', marginBottom: '15px', fontWeight: 'bold' }}>
                SECTION III: PERSONAL ATTRIBUTES — Weight 20% (PGB Corporate Values)
              </div>
              <div style={{ display: 'grid', gap: '20px' }}>
                {personalAttributes.map((attr, idx) => (
                  <div key={idx} style={{ padding: '15px', border: `2px solid ${colors.navy}`, borderRadius: '6px', backgroundColor: '#f0f8ff' }}>
                    <h4 style={{ color: colors.navy, margin: '0 0 8px 0', fontSize: '15px', fontWeight: '600' }}>{attr.name}</h4>
                    <p style={{ color: '#666', margin: '0 0 12px 0', fontSize: '13px' }}>{attr.desc}</p>
                    <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
                      {[1, 2, 3, 4, 5].map((n) => (
                        <button
                          key={n}
                          onClick={() => setScores({ ...scores, [attr.name]: n })}
                          style={{
                            width: '40px', height: '40px', borderRadius: '50%',
                            border: `2px solid ${scores[attr.name] === n ? colors.orange : '#ddd'}`,
                            backgroundColor: scores[attr.name] === n ? colors.orange : 'white',
                            color: scores[attr.name] === n ? 'white' : colors.navy,
                            fontWeight: 'bold', cursor: 'pointer', fontSize: '14px', transition: 'all 0.2s'
                          }}
                        >
                          {n}
                        </button>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div style={{ display: 'flex', gap: '10px' }}>
              <button onClick={() => setScreen('pathChoice')} style={{ flex: 1, padding: '12px', backgroundColor: '#ccc', color: colors.navy, border: 'none', borderRadius: '4px', cursor: 'pointer', fontWeight: '600' }}>Back</button>
              <button
                onClick={() => {
                  const totalDimensions = competencies.length + personalAttributes.length; // 10 total
                  if (Object.keys(scores).length === totalDimensions) {
                    setScreen('review');
                  } else {
                    alert(`⚠️ Please rate all ${totalDimensions} dimensions (6 Competencies + 4 Personal Attributes) before continuing`);
                  }
                }}
                style={{ flex: 1, padding: '12px', backgroundColor: colors.orange, color: 'white', border: 'none', borderRadius: '4px', cursor: 'pointer', fontWeight: 'bold', fontSize: '16px' }}
              >
                Generate IDP ➜
              </button>
            </div>
          </div>
        );
      }

      // REVIEW/IDP
      if (screen === 'review') {
        const allDimensions = [...competencies, ...personalAttributes];
        const avg = (Object.values(scores).reduce((a, b) => a + b, 0) / allDimensions.length).toFixed(1);
        const strengths = allDimensions.filter(d => scores[d.name] >= 4);
        const development = allDimensions.filter(d => scores[d.name] < 3);

        return (
          <div style={{ maxWidth: '900px', margin: '0 auto', padding: '40px 20px' }}>
            <div style={{ padding: '15px 20px', backgroundColor: colors.navy, color: 'white', borderRadius: '8px', marginBottom: '20px', textAlign: 'center' }}>
              <h2 style={{ margin: '0 0 5px 0' }}>Step 4 of 5: Your Development Plan</h2>
            </div>

            <div style={{ padding: '20px', backgroundColor: colors.cream, borderRadius: '8px', marginBottom: '20px', borderLeft: `5px solid ${colors.orange}` }}>
              <h3 style={{ color: colors.navy, margin: '0 0 15px 0' }}>📊 Your Profile & Assessment</h3>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '15px', fontSize: '14px' }}>
                <div><strong>Name:</strong> {profile.name}</div>
                <div><strong>Job Grade:</strong> {profile.role}</div>
                <div><strong>Department:</strong> {profile.dept}</div>
                <div><strong>Path Choice:</strong> {pathChoice.charAt(0).toUpperCase() + pathChoice.slice(1)}</div>
                <div><strong>Average Score:</strong> <span style={{ color: colors.orange, fontWeight: 'bold', fontSize: '16px' }}>{avg}/5.0</span></div>
              </div>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '20px', marginBottom: '20px' }}>
              <div style={{ padding: '15px', backgroundColor: '#e8f5e9', borderRadius: '6px' }}>
                <h4 style={{ color: '#2e7d32', margin: '0 0 10px 0' }}>💪 Strengths ({strengths.length})</h4>
                <ul style={{ listStyle: 'none', padding: 0, margin: 0, fontSize: '13px' }}>
                  {strengths.length > 0 ? strengths.map((s, i) => <li key={i} style={{ marginBottom: '5px' }}>✓ {s.name}</li>) : <li style={{ color: '#999' }}>Continue building!</li>}
                </ul>
              </div>
              <div style={{ padding: '15px', backgroundColor: '#ffebee', borderRadius: '6px' }}>
                <h4 style={{ color: '#c62828', margin: '0 0 10px 0' }}>📈 Development Areas ({development.length})</h4>
                <ul style={{ listStyle: 'none', padding: 0, margin: 0, fontSize: '13px' }}>
                  {development.length > 0 ? development.map((d, i) => <li key={i} style={{ marginBottom: '5px' }}>→ {d.name}</li>) : <li style={{ color: '#999' }}>Great balance!</li>}
                </ul>
              </div>
            </div>

            <div style={{ padding: '15px', backgroundColor: '#fff3cd', borderRadius: '6px', marginBottom: '20px', fontSize: '13px', color: '#856404' }}>
              <strong>🎯 Key Initiatives for Next 12 Months:</strong>
              <ul style={{ marginTop: '10px', paddingLeft: '20px' }}>
                <li>Core Competency Development (Leadership Dev Program, bi-weekly 1:1s)</li>
                <li>Skill Building (STEP UP V2.0, certifications, cross-functional projects)</li>
                <li>Leadership & Culture (Career Lattice Workshops, ACE Sustainability, AI Lab Series)</li>
                <li>Measurement (Quarterly EOS Rocks, monthly check-ins, 360 feedback at 6 months)</li>
              </ul>
            </div>

            <div style={{ display: 'flex', gap: '10px' }}>
              <button onClick={() => setScreen('assessment')} style={{ flex: 1, padding: '12px', backgroundColor: '#ccc', color: colors.navy, border: 'none', borderRadius: '4px', cursor: 'pointer', fontWeight: '600' }}>Back</button>
              <button
                onClick={() => {
                  const newSubmission = { ...profile, path: pathChoice, avgScore: avg, timestamp: new Date().toISOString() };
                  const updated = [...submissions, newSubmission];
                  setSubmissions(updated);
                  localStorage.setItem('cl_submissions', JSON.stringify(updated));
                  alert('✅ Career Lattice submitted!\n\nCalendar invite will be sent to ' + profile.supervisor);
                  setScreen('done');
                }}
                style={{ flex: 1, padding: '12px', backgroundColor: colors.orange, color: 'white', border: 'none', borderRadius: '4px', cursor: 'pointer', fontWeight: 'bold', fontSize: '16px' }}
              >
                Submit & Schedule ✓
              </button>
            </div>
          </div>
        );
      }

      // DONE
      if (screen === 'done') {
        return (
          <div style={{ maxWidth: '600px', margin: '0 auto', padding: '60px 20px', textAlign: 'center' }}>
            <h1 style={{ fontSize: '60px', margin: '0 0 20px 0' }}>✅</h1>
            <h2 style={{ color: colors.navy, marginBottom: '20px' }}>Career Conversation Scheduled!</h2>
            <div style={{ padding: '20px', backgroundColor: colors.cream, borderRadius: '8px', marginBottom: '30px', textAlign: 'left', fontSize: '14px', lineHeight: '1.8' }}>
              <p style={{ margin: '8px 0' }}>✓ Calendar invite sent to <strong>{profile.supervisor}</strong></p>
              <p style={{ margin: '8px 0' }}>✓ Your IDP has been submitted to HR</p>
              <p style={{ margin: '8px 0' }}>✓ 45-minute career conversation scheduled</p>
              <p style={{ margin: '8px 0' }}>✓ Supervisor can view your full development plan</p>
            </div>
            <button
              onClick={() => {
                setScreen('login');
                setProfile({ name: '', employeeId: '', email: '', role: 'JG1', dept: '', supervisor: '', supervisorEmail: '' });
                setPathChoice(null);
                setScores({});
              }}
              style={{ width: '100%', padding: '12px', backgroundColor: colors.orange, color: 'white', border: 'none', borderRadius: '4px', cursor: 'pointer', fontWeight: 'bold', fontSize: '16px' }}
            >
              Logout
            </button>
          </div>
        );
      }
    }

    ReactDOM.render(<CareerLattice />, document.getElementById('root'));
  </script>
</body>
</html>
